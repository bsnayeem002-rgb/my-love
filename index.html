<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Love</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:360px;
background:#222;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px rgba(255,255,255,.15);
text-align:center;
}

h2{
color:#fff;
margin-top:0;
margin-bottom:20px;
}

video{
width:100%;
height:480px;
border-radius:15px;
display:none;
background:#000;
object-fit:cover;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4081;
color:#fff;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#e91e63;
}
</style>
</head>

<body>

<div class="box">
<h2>❤️ My Love ❤️</h2>

<video id="video" autoplay playsinline></video>

<button id="start">Start</button>

</div>

<script>
document.getElementById("start").onclick = async function () {
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
});
document.getElementById("video").srcObject = stream;
document.getElementById("video").style.display="block";
this.style.display="none";
}catch{
alert("Please allow camera access.");
}
};
</script>

</body>
</html>
